name: Build/Test

on:
  push: ~
  workflow_dispatch: ~

env:
  SOURCE_DIR: ${{github.workspace}}
  BUILD_DIR: ${{github.workspace}}/build
  VCPKG_DEFAULT_BINARY_CACHE: ${{github.workspace}}/.vcpkg-binary-cache
  QT_VERSION: 6.10.*

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #######################
  # MAIN PROGRAM
  #######################
  build:
    strategy:
      fail-fast: false
      matrix:
        system:
          - os: ubuntu-latest
            cmake_preset: linux-release
          - os: windows-latest
            cmake_preset: windows-release
            qt_arch: win64_msvc2022_64
    runs-on: ${{matrix.system.os}}
    steps:
      #######################
      # SETUP
      #######################
      - uses: actions/checkout@v6
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          cd .vcpkg && ./bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{github.workspace}}/.vcpkg" >> "$GITHUB_ENV"
      - name: Create vcpkg binary cache
        run: mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"
      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-binary-cache-${{ hashFiles('vcpkg*.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-binary-cache-
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: doc/requirements.txt
      - name: Install System Packages (Linux)
        if: ${{runner.os == 'Linux'}}
        run: |
          sudo apt-get update
          sudo apt-get -y install libcurl4-openssl-dev uuid-dev libgl1-mesa-dev qt6-base-dev qt6-svg-dev qt6-websockets-dev
      - name: Setup MSVC (Windows)
        if: ${{runner.os == 'Windows'}}
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: Install Qt
        # Don't need this on Linux, as Qt will come from the system package manager above
        if: ${{runner.os != 'Linux'}}
        uses: jurplel/install-qt-action@v4
        with:
          dir: ${{github.workspace}}/.qt
          version: ${{env.QT_VERSION}}
          arch: ${{matrix.system.qt_arch}}
          cache: true
          modules: qtwebsockets
      - uses: actions/setup-node@v6
        with:
          node-version-file: mobile_sacn_webui/package.json
          cache: npm
          cache-dependency-path: mobile_sacn_webui/package-lock.json
      #######################
      # BUILD
      #######################
      - name: Configure CMake
        run: >
          cmake
          -S "${SOURCE_DIR}"
          -B "${BUILD_DIR}"
          --preset=${{matrix.system.cmake_preset}}
          -DBUILD_TESTING=On 
          -DBUILD_PACKAGE=On 
          -DSENTRY_DSN="${{secrets.SENTRY_DSN}}"
          -DCMAKE_INSTALL_PREFIX="${{github.workspace}}/install_root"
      - name: Build
        run: cmake --build "${BUILD_DIR}"

      #######################
      # PACKAGE
      #######################
      - name: Package
        working-directory: ${{env.BUILD_DIR}}
        run: cpack -B "${BUILD_DIR}/packages"
      - name: Upload failed package artifacts
        uses: actions/upload-artifact@v6
        if: ${{ failure() }}
        with:
          name: failed_package_${{runner.os}}
          path: ${{env.BUILD_DIR}}/packages
      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: packages_${{runner.os}}_${{runner.arch}}
          path: ${{env.BUILD_DIR}}/packages/*.*
          if-no-files-found: error

  #######################
  # DOCS
  #######################
  docs:
    runs-on: ubuntu-latest
    steps:
      #######################
      # SETUP
      #######################
      - uses: actions/checkout@v6
        # Needed to grab 3rd party licenses.
      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git .vcpkg
          cd .vcpkg && ./bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{github.workspace}}/.vcpkg" >> "$GITHUB_ENV"
      - name: Create vcpkg binary cache
        run: mkdir -p "${VCPKG_DEFAULT_BINARY_CACHE}"
      - name: Restore vcpkg binary cache
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: ${{ runner.os }}-vcpkg-binary-cache-${{ hashFiles('vcpkg*.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-binary-cache-
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v6
        with:
          node-version-file: mobile_sacn_webui/package.json
          cache: npm
          cache-dependency-path: mobile_sacn_webui/package-lock.json
      #######################
      # BUILD
      #######################
      - name: Configure CMake
        shell: bash
        run: >
          cmake 
          -S "${SOURCE_DIR}"
          -B "${BUILD_DIR}"
          --preset=doc
      - name: Build
        shell: bash
        run: cmake --build "${BUILD_DIR}" --target mobile_sacn_doc_archive
      - name: Upload archive
        uses: actions/upload-artifact@v6
        with:
          name: packages_doc
          path: ${{env.BUILD_DIR}}/doc/mobile_sacn_doc.zip
          if-no-files-found: error

  #######################
  # RELEASE
  #######################
  release:
    needs:
      - build
      - docs
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: repo
      - name: Get built packages
        uses: actions/download-artifact@v8
        id: download
        with:
          pattern: packages_*
          path: packages
          merge-multiple: true
      - name: Release (dev build)
        uses: softprops/action-gh-release@v3
        with:
          # Manually mark release versions as such when writing release notes.
          prerelease: true
          draft: true
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: ${{steps.download.outputs.download-path}}/*
